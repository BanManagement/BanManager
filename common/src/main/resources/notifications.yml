# Notifications Configuration
# Controls how punishment notifications are delivered to staff and players
#
# Each notification event can specify delivery channels:
#   chat: true/false - Send via chat message (default: true)
#   actionbar: true/false - Send via action bar (disappears after a few seconds)
#   title: true/false - Send via title/subtitle overlay
#   sound: '' - Sound to play (empty to disable). Use Minecraft sound names e.g. entity.experience_orb.pickup
#
# Title settings (only used when title: true):
#   titleFadeIn: ticks for fade in (20 ticks = 1 second)
#   titleStay: ticks to stay on screen
#   titleFadeOut: ticks for fade out
#
# Sound settings:
#   soundVolume: 0.0 - 1.0
#   soundPitch: 0.0 - 2.0
#
# Platform notes:
#   - BungeeCord: title, showTitle and playSound are not supported (ignored silently)
#   - All other platforms (Bukkit/Paper, Velocity, Fabric, Sponge) support all channels

staff:
  ban:
    chat: true
    actionbar: false
    title: false
    sound: 'entity.experience_orb.pickup'
    soundVolume: 1.0
    soundPitch: 1.0
  tempban:
    chat: true
    actionbar: false
    title: false
    sound: 'entity.experience_orb.pickup'
    soundVolume: 1.0
    soundPitch: 1.0
  mute:
    chat: true
    actionbar: false
    title: false
    sound: ''
    soundVolume: 1.0
    soundPitch: 1.0
  tempmute:
    chat: true
    actionbar: false
    title: false
    sound: ''
    soundVolume: 1.0
    soundPitch: 1.0
  warn:
    chat: true
    actionbar: false
    title: false
    sound: 'entity.experience_orb.pickup'
    soundVolume: 1.0
    soundPitch: 1.0
  report:
    chat: true
    actionbar: false
    title: false
    sound: 'block.note_block.pling'
    soundVolume: 1.0
    soundPitch: 1.0
  duplicateIp:
    chat: true
    actionbar: false
    title: false
    sound: ''
    soundVolume: 1.0
    soundPitch: 1.0

player:
  muted:
    actionbar: true
  warned:
    sound: 'entity.villager.no'
    soundVolume: 1.0
    soundPitch: 1.0
