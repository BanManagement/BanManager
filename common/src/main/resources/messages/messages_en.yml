# Message templates use MiniMessage formatting: https://docs.advntr.dev/minimessage/format.html
# Placeholders use angle brackets, e.g. <reason>, <player>, <ip>, <actor>, <expires>

tokens:
  appeal_url: 'https://yourdomain.com/appeal'
  server_name: 'My Server'
  discord_url: 'https://discord.gg/example'
  rules_url: 'https://yourdomain.com/rules'

messages:
  duplicateIP: '<red>Warning: <player> has the same IP as the following banned players:\n<gold><players>'
  duplicateIPAlts: '<red>Warning: <player> has the same IP as the following players:\n<gold><players>'
  configReloaded: '<green>Configuration reloaded successfully!'
  deniedNotify:
    player: '<red>Warning: <player> attempted to join the server but was denied due to <dark_red><reason>'
    ip: '<red>Warning: <ip> attempted to join the server but was denied due to <dark_red><reason>'
  deniedMaxIp: '<red>Too many players with your ip address online'
  deniedMultiaccounts: '<red>Too many players with your ip address logged in recently'
  deniedCountry: '<red>You may not connect from your region'

  time:
    now: 'now'
    year: 'year'
    years: 'years'
    month: 'month'
    months: 'months'
    week: 'week'
    weeks: 'weeks'
    day: 'day'
    days: 'days'
    hour: 'hour'
    hours: 'hours'
    minute: 'minute'
    minutes: 'minutes'
    second: 'second'
    seconds: 'seconds'
    never: 'never'
    error:
      invalid: '<red>Your time length is invalid'
      limit: '<red>You cannot perform this action for that length of time'

  none: 'none'
  # General command text
  sender:
    error:
      notFound: '<red><player> not found, are you sure they exist?'
      offline: '<red><player> is offline'
      noSelf: '<red>You cannot perform that action on yourself!'
      exception: '<red>An error occured whilst attempting to perform this command. Please check the console for further details.'
      invalidIp: '<red>Invalid IP address, expecting w.x.y.z format'
      offlinePermission: '<red>You are not allowed to perform this action on an offline player'
      ambiguousPlayer: '<red>Multiple players match "<player>". Please use their full name.'
      exempt: '<red><player> is exempt from that action'
      noPermission: '<red>You do not have permission to perform that action'
      noConsole: '<red>This command cannot be used from console'
      invalidReason: '<red><reason> is no valid reason.'
  # Commands
  alts:
    header: 'Possible alts found:'
    entry: '<click:run_command:"/bminfo <name>"><name></click>'
    separator: '<gray>, '

  names:
    header: 'Known names for <player>:'
    row: '<yellow><name> <gray>(first: <first_seen>, last: <last_seen>)'
    interactive: '<hover:show_text:"<yellow><name> <gray>(first: <first_seen>, last: <last_seen>)"><click:run_command:"/bminfo <name>"><yellow><name></click></hover>'
    separator: '<gray>, '
    dateTimeFormat: 'dd-MM-yyyy'
    none: '<gray>No name history found'

  export:
    error:
      inProgress: '<red>An export is already in progress, please wait'
    player:
      started: '<green>Player ban export started'
      finished: '<green>Player ban export finished, file <file> created'
    ip:
      started: '<green>IP ban export started'
      finished: '<green>IP ban export finished, file <file> created'

  import:
    error:
      inProgress: '<red>An import is already in progress, please wait'
    player:
      started: '<green>Player ban import started'
      finished: '<green>Player ban import finished'
    ip:
      started: '<green>IP ban import started'
      finished: '<green>IP ban import finished'
    advancedban:
      started: '<green>AdvancedBan import started'
      finished: '<green>AdvancedBan import finished'
    h2:
      started: '<green>H2 import started'
      finished: '<green>H2 import finished, please restart the server'
    litebans:
      started: '<green>LiteBans import started'
      finished: '<green>LiteBans import finished'

  info:
    error:
      invalidIndex: '<red>Invalid player option used'
      indexRequired: '<red>Multiple players named <name> found, please select a player by providing an index between 1 and <size>, e.g. /bminfo <name> 1'
      index: '<gray>#<index> - <gold><name> - <dark_red><uuid>'
    stats:
      player: '<gold><player> has been banned <bans> times, muted <mutes> times, kicked <kicks> times and warned <warns>
      times (<warn_points> Points), has <notes> notes and been reported <reports> times'
      ip: '<gold>This ip has been banned <bans> times, muted <mutes> times and range banned <rangebans> times'
    connection: '<gold>Their last connection was with <ip> on <last_seen>'
    geoip: 'Country: <country> City: <city>'
    ban:
      permanent: '<gold>Currently banned for <dark_red><reason><gold> by <actor> at <created>'
      temporary: '<gold>Currently banned for <dark_red><reason><gold> by <actor> at <created> which expires in <expires>'
      dateTimeFormat: 'dd-MM-yyyy HH:mm:ss'
    ipban:
      permanent: '<gold>Currently banned for <dark_red><reason><gold> by <actor> at <created>'
      temporary: '<gold>Currently banned for <dark_red><reason><gold> by <actor> at <created> which expires in <expires>'
      dateTimeFormat: 'dd-MM-yyyy HH:mm:ss'
    iprangeban:
      permanent: '<gold><from> - <to> banned for <dark_red><reason><gold> by <actor> at <created>'
      temporary: '<gold><from> - <to> banned for <dark_red><reason><gold> by <actor> at <created> which expires in <expires>'
      dateTimeFormat: 'dd-MM-yyyy HH:mm:ss'
    ipmute:
      permanent: '<gold>Currently muted for <dark_red><reason><gold> by <actor> at <created>'
      temporary: '<gold>Currently muted for <dark_red><reason><gold> by <actor> at <created> which expires in <expires>'
      dateTimeFormat: 'dd-MM-yyyy HH:mm:ss'
    mute:
      permanent: '<gold>Currently muted for <dark_red><reason><gold> by <actor> at <created>'
      temporary: '<gold>Currently muted for <dark_red><reason><gold> by <actor> at <created> which expires in <expires>'
      temporaryOnline: '<gold>Currently muted for <dark_red><reason><gold> by <actor> at <created> which expires in <expires> (online time)'
      temporaryOnlinePaused: '<gold>Currently muted for <dark_red><reason><gold> by <actor> at <created> with <remaining> remaining (online time, paused)'
      dateTimeFormat: 'dd-MM-yyyy HH:mm:ss'
    website:
      player: 'https://yourdomain.com/player/<uuid>'
      ip: 'http://yourdomain.com/index.php?action=viewip&ip=<ip>&server=0'
    history:
      row: '<gray>#<id> <green>[<white><type><green>] <gold><actor><white> <meta> <reason> - <yellow><created>'
      dateTimeFormat: 'dd-MM-yyyy HH:mm:ss'
      noResults: '<red>No results found'
    ips:
      row: '<yellow><ip> - <gold><join> - <leave>'
      dateTimeFormat: 'dd-MM-yyyy HH:mm:ss'

  kick:
    player:
      noReason: '<gold>You have been kicked'
      reason: '<gold>You have been kicked for <dark_red><reason>'
    notify:
      noReason: '<gold><player> has been kicked by <actor> <click:run_command:"/bminfo <player>"><hover:show_text:"<gray>View player info"><dark_aqua>[Info]</dark_aqua></hover></click>'
      reason: '<gold><player> has been kicked by <actor> for <dark_red><reason> <click:run_command:"/bminfo <player>"><hover:show_text:"<gray>View player info"><dark_aqua>[Info]</dark_aqua></hover></click>'

  kickall:
    player:
      noReason: '<gold>You have been kicked'
      reason: '<gold>You have been kicked for <dark_red><reason>'
    notify:
      noReason: 'All players have been kicked by <actor>'
      reason: 'All players have been kicked by <actor> for <dark_red><reason>'

  ban:
    player:
      disallowed: '<red><bold>You are banned from this server</bold></red>\n \n<gray>Reason: <white><reason>\n<gray>Banned by: <white><actor>\n<gray>Date: <white><created>\n \n<gold>Appeal at <appeal_url>'
      kick: '<red><bold>You have been banned</bold></red>\n \n<gray>Reason: <white><reason>\n<gray>Banned by: <white><actor>'
      dateTimeFormat: 'yyyy-MM-dd HH:mm:ss'
    notify: '<gold><player> has been permanently banned by <actor> for <dark_red><reason> <click:run_command:"/bminfo <player>"><hover:show_text:"<gray>View player info"><dark_aqua>[Info]</dark_aqua></hover></click> <click:run_command:"/unban <player>"><hover:show_text:"<gray>Unban player"><dark_aqua>[Unban]</dark_aqua></hover></click>'
    error:
      exists: '<red><player> is already banned'
      cooldown: '<red>This player was banned too recently, try again later'

  banall:
    notify: '<gold><player> will be permanently banned by <actor> for <dark_red><reason>'

  tempban:
    player:
      disallowed: '<red><bold>You are temporarily banned from this server</bold></red>\n \n<gray>Reason: <white><reason>\n<gray>Banned by: <white><actor>\n<gray>Expires: <white><expires>\n<gray>Date: <white><created>\n \n<gold>Appeal at <appeal_url>'
      kick: '<red><bold>You have been temporarily banned</bold></red>\n \n<gray>Reason: <white><reason>\n<gray>Banned by: <white><actor>\n<gray>Expires: <white><expires>'
      dateTimeFormat: 'yyyy-MM-dd HH:mm:ss'
    notify: '<gold><player> has been temporarily banned for <expires> by <actor> for <dark_red><reason> <click:run_command:"/bminfo <player>"><hover:show_text:"<gray>View player info"><dark_aqua>[Info]</dark_aqua></hover></click> <click:run_command:"/unban <player>"><hover:show_text:"<gray>Unban player"><dark_aqua>[Unban]</dark_aqua></hover></click>'

  tempbanall:
    notify: '<gold><player> will be temporarily banned for <expires> by <actor> for <dark_red><reason>'

  unban:
    notify: '<gold><player> has been unbanned by <actor>'
    error:
      noExists: '<red><player> is not banned'
      notOwn: '<red><player> was not banned by you, unable to unban'

  unbanall:
    notify: '<gold><player> will be unbanned by <actor>'

  mute:
    player:
      blocked: '<red>You may not use the <command> command whilst muted!'
      disallowed: '<gold>You have been permanently muted for <dark_red><reason> <gold>by <actor>'
      broadcast: '<dark_red>[Muted] <player><gray> <message>'
    notify: '<gold><player> has been permanently muted by <actor> for <dark_red><reason> <click:run_command:"/bminfo <player>"><hover:show_text:"<gray>View player info"><dark_aqua>[Info]</dark_aqua></hover></click> <click:run_command:"/unmute <player>"><hover:show_text:"<gray>Unmute player"><dark_aqua>[Unmute]</dark_aqua></hover></click>'
    error:
      exists: '<red><player> is already muted'
      cooldown: '<red>This player was muted too recently, try again later'

  muteip:
    ip:
      disallowed: '<gold>You have been permanently muted for <dark_red><reason> <gold>by <actor>'
      broadcast: '<dark_red>[Muted] <player><gray> <message>'
    notify: '<gold><ip> (<players>) have been permanently muted by <actor> for <dark_red><reason>'
    error:
      exists: '<red><ip> is already muted'

  muteall:
    notify: '<gold><player> will be permanently muted by <actor> for <dark_red><reason>'

  tempmute:
    player:
      disallowed: '<gold>You have been temporarily muted for <dark_red><reason> <gold>by <actor> which expires in <expires>'
      disallowedOnline: '<gold>You have been temporarily muted for <dark_red><reason> <gold>by <actor> which expires in <expires> (online time)'
    notify: '<gold><player> has been temporarily muted for <expires> by <actor> for <dark_red><reason> <click:run_command:"/bminfo <player>"><hover:show_text:"<gray>View player info"><dark_aqua>[Info]</dark_aqua></hover></click> <click:run_command:"/unmute <player>"><hover:show_text:"<gray>Unmute player"><dark_aqua>[Unmute]</dark_aqua></hover></click>'
    notifyOnline: '<gold><player> has been temporarily muted for <expires> (online time) by <actor> for <dark_red><reason>'
    error:
      exists: '<red><player> is already muted'

  tempmuteip:
    ip:
      disallowed: '<gold>You have been temporarily muted for <dark_red><reason> <gold>by <actor> which expires in <expires>'
    notify: '<gold><ip> (<players>) have been temporarily muted for <expires> by <actor> for <dark_red><reason>'
    error:
      exists: '<red><ip> is already muted'

  tempmuteall:
    notify: '<gold><player> will be temporarily muted for <expires> by <actor> for <dark_red><reason>'

  unmute:
    notify: '<gold><player> has been unmuted by <actor>'
    player: '<gold>You have been unmuted by <actor>'
    error:
      noExists: '<red><player> is not muted'
      notOwn: '<red><player> was not muted by you, unable to unmute'

  unmuteip:
    notify: '<gold><ip> has been unmuted by <actor>'
    error:
      noExists: '<red><ip> is not muted'
      notOwn: '<red><ip> was not muted by you, unable to unmute'

  unmuteall:
    notify: '<gold><player> will be unmuted by <actor>'

  banname:
    name:
      disallowed: '<gold>You have been banned from this server for <dark_red><reason>'
      kick: '<gold>You have been banned permanently for <dark_red><reason>'
      dateTimeFormat: 'yyyy-MM-dd HH:mm:ss'
    notify: '<gold>Name <name> has been permanently banned by <actor> for <dark_red><reason>'
    error:
      exists: '<red>Name <name> is already banned'

  tempbanname:
    name:
      disallowed: '<gold>You have been banned from this server for <dark_red><reason> \n<gold>It expires in <expires>'
      kick: '<gold>You have been temporarily banned for <dark_red><reason>'
      dateTimeFormat: 'yyyy-MM-dd HH:mm:ss'
    notify: '<gold>Name <name> has been temporarily banned for <expires> by <actor> for <dark_red><reason>'

  unbanname:
    notify: '<gold>Name <name> has been unbanned by <actor>'
    error:
      noExists: '<red>Name <name> is not banned'

  banip:
    ip:
      disallowed: '<gold>You have been banned from this server for <dark_red><reason>'
      kick: '<gold>You have been banned permanently for <dark_red><reason>'
      dateTimeFormat: 'yyyy-MM-dd HH:mm:ss'
    notify: '<gold><ip> (<players>) has been permanently banned by <actor> for <dark_red><reason>'
    error:
      exists: '<red><ip> is already banned'
      cooldown: '<red>This ip was banned too recently, try again later'

  baniprange:
    error:
      invalid: '<red>Invalid range, please use cidr notation 192.168.0.1/16 or wildcard 192.168.*.*'
      minMax: '<red>Range must be lowest to highest'
      exists: '<red>A ban containing those ranges already exists'
    ip:
      disallowed: '<gold>You have been banned from this server for <dark_red><reason>'
      kick: '<gold>You have been banned permanently for <dark_red><reason>'
      dateTimeFormat: 'yyyy-MM-dd HH:mm:ss'
    notify: '<gold><from> - <to> have been banned by <actor>'

  tempbaniprange:
    notify: '<gold><from> - <to> has been temporarily banned for <expires> by <actor>'
    ip:
      disallowed: '<gold>You have been banned from this server for <dark_red><reason> \n<gold>It expires in <expires>'
      kick: '<gold>You have been temporarily banned for <expires> by <actor> for <dark_red><reason>'
      dateTimeFormat: 'yyyy-MM-dd HH:mm:ss'

  unbaniprange:
    notify: '<gold><from> - <to> has been unbanned by <actor>'

  banipall:
    notify: '<gold><ip> will be permanently banned by <actor> for <dark_red><reason>'

  tempbanip:
    ip:
      disallowed: '<gold>You have been banned from this server for <dark_red><reason> \n<gold>It expires in <expires>'
      kick: '<gold>You have been temporarily banned for <dark_red><reason>'
      dateTimeFormat: 'yyyy-MM-dd HH:mm:ss'
    notify: '<gold><ip> (<players>) has been temporarily banned for <expires> by <actor> for <dark_red><reason>'

  tempbanipall:
    notify: '<gold><ip> will be temporarily banned for <expires> by <actor> for <dark_red><reason>'

  unbanip:
    notify: '<gold><ip> has been unbanned by <actor>'
    error:
      noExists: '<red><ip> is not banned'
      notOwn: '<red><ip> was not banned by you, unable to unban'

  unbanipall:
    notify: '<gold><ip> will be unbanned by <actor>'

  warn:
    player:
      warned: '<gold>You have been warned by <actor> for <dark_red><reason>'
      disallowed:
        header: '<red>You may not speak until you have accepted your most recent warning. Please type the following:'
        reason: '<gold><reason>'
        removed: '<green>Thank you for your understanding, you may now speak again'
    notify: '<gold><player> has been warned by <actor> for <dark_red><reason> <click:run_command:"/bminfo <player>"><hover:show_text:"<gray>View player info"><dark_aqua>[Info]</dark_aqua></hover></click>'
    error:
      cooldown: '<red>This player was warned too recently, try again later'

  tempwarn:
    player:
      warned: '<gold>You have been warned for <expires> by <actor> for <dark_red><reason>'
    notify: '<gold><player> has been warned for <expires> by <actor> for <dark_red><reason> <click:run_command:"/bminfo <player>"><hover:show_text:"<gray>View player info"><dark_aqua>[Info]</dark_aqua></hover></click>'

  dwarn:
    player:
      notify: '<gold>Your most recent warning has been deleted by <dark_red><actor>'
    notify: '<red>The most recent warning for <player> has been deleted'
    error:
      noWarnings: '<red><player> has no warnings to delete'

  bmclear:
    notify: '<red><player> has had their <type> cleared'
    error:
      invalid: '<red>Invalid type, please choose between banrecords, muterecords, kicks, notes or warnings'

  bmutils:
    missingplayers:
      notify: '<red><amount> missing players added'
      noneFound: '<green>0 missing players found'
      found: '<red><amount> missing player data found. Fixing...'
      error:
        failedLookup: '<red>Failed to lookup player <uuid>, check server logs'
      complete: '<green><amount> players resolved, please restart your server for failed punishments to take affect'
    duplicates:
      lookup:
        notFound: '<green>No duplicate player names found'
      error:
        invalidName: '<red>Invalid name, must be 16 characters or less and contain only letters, numbers and an underscore'
        nameExists: '<red>A player with that name already exists'
      success: '<green>Player name set to <player> successfully'

  bmrollback:
    notify: '<red><player> has had their <type> actions undone'
    error:
      invalid: '<red>Invalid type <type>, please choose between <types>'

  sync:
    player:
      started: '<green>Starting force <type> synchronisation'
      finished: '<green>Forced <type> synchronisation complete'

  update:
    notify: '<gold>[BanManager] <green>An update is available'

  notes:
    header: '<gold><player> has the following notes:'
    joinAmount: '<click:run_command:"/notes <player>"><gold><player> has <yellow><amount> <gold>notes, click to view them</click>'
    note: '<gold>[<player>] <yellow><message> - <yellow><created>'
    playerNote: '<green>[<player>] <gold>[<actor>] <yellow><message> - <yellow><created>'
    dateTimeFormat: 'dd-MM-yyyy'
    notify: '<player> has a new note attached by <actor>: <message>'
    error:
      noNotes: '<red><player> has no notes'
      noOnlineNotes: '<red>No online players have notes'

  report:
    notify: '<gold><player> has been reported by <actor> for <dark_red><reason>'
    error:
      cooldown: '<red>This player was reported too recently, try again later'
    assign:
      player: '<green>Report <id> assigned to <player>'
      notify: '<green>You have been assigned report <id> by <actor>'
    unassign:
      player: '<green>Report <id> unassigned'
    close:
      notify:
        closed: '<green>Report <id> closed by <actor>'
        command: '<green>Report <id> closed by <actor> with <command>'
        comment: '<green>Report <id> closed by <actor> with <comment>'
      dispatch: 'Executing command <command>'
    list:
      noResults: '<red>No reports found'
      error:
        invalidState: '<red>Report state <state> not found'
      row:
        dateTimeFormat: 'yyyy-MM-dd HH:mm:ss'
        header: '<yellow>-- Reports (<count>) -- Page (<page>/<max_page>)'
        all: '<click:run_command:"/reports info <id>"><hover:show_text:"<gray>Click to view details"><gray>#<id> <yellow>[<state>] <gold>- <created> - <player></hover></click>'
    tp:
      error:
        notFound: '<red>Report not found'
        worldNotFound: '<red>World <world> could not be found'
        invalidId: '<red><id> is not a valid report id'
      dateTimeFormat: 'yyyy-MM-dd HH:mm:ss'
      notify:
        report: '<gray>#<id> <gold><actor> reported <player> for <dark_red><reason><gold> at <created>'
        location: '<world> - <x>, <y>, <z>'
    info:
      error:
        notFound: '<red>Report not found'
        invalidId: '<red><id> is not a valid report id'
      dateTimeFormat: 'yyyy-MM-dd HH:mm:ss'
      notify:
        report: '<gray>#<id> <gold><actor> reported <player> for <dark_red><reason><gold> at <created>'
        location: '<world> - <x>, <y>, <z>'
    actions:
      assign: '<click:run_command:"/reports assign <id>"><hover:show_text:"<gray>Assign to yourself"><dark_aqua>[Assign]</dark_aqua></hover></click>'
      close: '<click:run_command:"/reports close <id>"><hover:show_text:"<gray>Close this report"><green>[Close]</green></hover></click>'
      tp: '<click:run_command:"/reports tp <id>"><hover:show_text:"<gray>Teleport to location"><aqua>[TP]</aqua></hover></click>'
    feedback:
      assigned: '<gold>Your report #<id> has been assigned to <actor>'
      closed: '<gold>Your report #<id> has been closed by <actor>'

  addnoteall:
    notify: '<red><player> will have a new attached by <actor>: <message>'

  banlist:
    header: '<gold>There are <bans> <type> bans:'
    row:
      player: '<click:run_command:"/bminfo <name>"><hover:show_text:"<gray>Click for info"><gold><name></gold></hover></click> <gray>- <dark_red><reason>'
      ip: '<gold><ip> <gray>- <dark_red><reason>'
      iprange: '<gold><from_ip> - <to_ip> <gray>- <dark_red><reason>'

  bmactivity:
    row:
      all: '<green>[<white><type><green>] <gold><player><white> - <gold><actor><white> - <yellow><created>'
      player: '<green>[<white><type><green>] <gold><player><white> - <yellow><created>'
      dateTimeFormat: 'dd-MM-yyyy HH:mm:ss'
    noResults: '<red>No results found'

  bmdelete:
    notify: '<green><rows> rows deleted'
    error:
      invalid: '<red>Invalid type, please choose between banrecords, muterecords, kicks, notes or warnings'
      invalidId: '<red><id> is not a valid number'

  denyalts:
    player:
      disallowed: '<red>The IP address you are joining from is linked to a banned player'

  reasons:
    row: '<hashtag> = <reason>'

  dashboard:
    header: '<dark_gray><strikethrough>                    </strikethrough><reset> <gold><bold>Staff Dashboard</bold></gold> <dark_gray><strikethrough>                    </strikethrough>'
    activeBans: '<gray>Active Bans: <white><count>'
    activeMutes: '<gray>Active Mutes: <white><count>'
    openReports: '<gray>Open Reports: <white><count> <click:run_command:"/reports list 1"><hover:show_text:"<gray>View reports"><dark_aqua>[View]</dark_aqua></hover></click>'
    recentActivity: '<gray>Recent Activity (24h): <white><count>'
    footer: '<dark_gray><strikethrough>                                                        </strikethrough>'
